name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go test ./...

      - name: Build archives
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          mkdir -p dist
          for target in darwin/aarch64 darwin/x86_64 linux/x86_64 linux/aarch64; do
            os="${target%/*}"
            arch="${target#*/}"
            case "$arch" in
              aarch64) goarch=arm64 ;;
              x86_64) goarch=amd64 ;;
            esac
            name="notifuse-cli-${version}-${os}-${arch}"
            GOOS="$os" GOARCH="$goarch" CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o "dist/${name}/notifuse" .
            tar -C "dist/${name}" -czf "dist/${name}.tar.gz" notifuse
            rm -rf "dist/${name}"
          done
          cd dist
          sha256sum *.tar.gz > SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
